name: List Files and Print Working Directory on Self-Hosted Runner

on:
  push:
    branches:
      - branch1
 

jobs:
  test-job:
    runs-on: [self-hosted]  

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        ref: 'branch1'

    - name: Clone specified repository
        run: |
          git clone ${{ github.event.inputs.repository_url }} cloned-repo
          echo "Repository cloned successfully!"
        
        


        
